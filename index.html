<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <script src="wasm_exec.js"></script>
    <style>
        .board { display: grid; grid-template-columns: repeat(8, 40px); gap: 2px; background: #333; width: fit-content; }
        .cell { width: 40px; height: 40px; background: green; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .piece { width: 30px; height: 30px; border-radius: 50%; }
        .black { background: black; }
        .white { background: white; }
    </style>
</head>
<body>
    <div id="board" class="board"></div>
    <script>
        const go = new Go();
        WebAssembly.instantiateStreaming(fetch("main.wasm"), go.importObject).then((result) => {
            go.run(result.instance);
            render();
        });

        function render() {
            const container = document.getElementById("board");
            container.innerHTML = "";
            const data = getBoard(); // Goの関数を呼び出し
            data.forEach((row, y) => {
                row.forEach((v, x) => {
                    const cell = document.createElement("div");
                    cell.className = "cell";
                    cell.onclick = () => { pressCell(x, y); render(); };
                    if (v > 0) {
                        const p = document.createElement("div");
                        p.className = "piece " + (v === 1 ? "black" : "white");
                        cell.appendChild(p);
                    }
                    container.appendChild(cell);
                });
            });
        }
    </script>
</body>
</html>
